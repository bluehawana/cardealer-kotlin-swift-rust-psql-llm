apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cardeal

resources:
  - ../../base

# Production image tag — updated by CI/CD on release
images:
  - name: ghcr.io/bluehawana/cardealer-kotlin-swift-rust-psql-llm
    newTag: v0.1.0

# Production-specific patches
patches:
  - target:
      kind: Deployment
      name: cardeal-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
