apiVersion: apps/v1
kind: Deployment
metadata:
  name: cardeal-api
  namespace: cardeal
  labels:
    app.kubernetes.io/name: cardeal-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cardeal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cardeal-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cardeal-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/bluehawana/cardealer-kotlin-swift-rust-psql-llm:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: cardeal-secrets
            - configMapRef:
                name: cardeal-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      restartPolicy: Always
