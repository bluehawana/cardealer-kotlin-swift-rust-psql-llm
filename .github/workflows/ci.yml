name: CI — Build, Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  # ─── Check formatting ────────────────────────────────────────
  fmt:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─── Lint with clippy ────────────────────────────────────────
  clippy:
    name: 📎 Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - run: cargo clippy --all-targets -- -D warnings

  # ─── Build & test ────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    needs: [fmt]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cardeal_test
          POSTGRES_USER: cardeal
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'test_only_ci' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://cardeal:${{ secrets.TEST_DB_PASSWORD || 'test_only_ci' }}@localhost:5432/cardeal_test
      REDIS_ADDR: redis://localhost:6379
      SERVER_PORT: 8080
      AI_API_KEY: ""
      AI_MODEL: gpt-4o
      AI_BASE_URL: https://api.openai.com/v1
      AI_MAX_TOKENS: 4096

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release -- --nocapture

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardeal-linux-amd64
          path: target/release/cardeal
          retention-days: 7

  # ─── Security audit ──────────────────────────────────────────
  audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2023-0071
